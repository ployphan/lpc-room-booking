# fly.toml app configuration file generated for lpc-room-booking on 2026-07-10T12:09:03Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'lpc-room-booking'
primary_region = 'sin'

[build]

[env]
  DATABASE_PATH = '/data/database.db'

[[mounts]]
  source = 'lpc_data'
  destination = '/data'

[http_service]
  internal_port = 80
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
