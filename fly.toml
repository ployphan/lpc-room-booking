# fly.toml file generated for Fly.io deployment
app = ""
primary_region = "ams"

[http_service]
  internal_port = 80
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[env]
  DATABASE_PATH = "/data/database.db"

[mounts]
  source = "lpc_data"
  destination = "/data"
